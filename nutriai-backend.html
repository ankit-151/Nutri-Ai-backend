<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NutriAI — AI Nutrition Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ══════════════════════════════════════════
   THEMES — dark (default) + light + ocean + forest + sunset
   ══════════════════════════════════════════ */
:root,[data-theme="dark"]{
  --bg:#08090c;--bg2:#0e1018;--bg3:#13151f;
  --surface:#181b27;--surface2:#1e2235;
  --border:#ffffff14;--border2:#ffffff22;
  --text:#f0f2ff;--text2:#9ba3c4;--text3:#5c6480;
  --blue:#4f7dff;--blue2:#3a63e8;--purple:#8b5cf6;
  --cyan:#22d3ee;--green:#10b981;--orange:#f59e0b;--red:#ef4444;
  --grad:linear-gradient(135deg,#4f7dff,#8b5cf6);
  --glow:0 0 40px #4f7dff22;
  --nav-bg:rgba(8,9,12,.9);
  --chart-grid:#ffffff08;--chart-tick:#5c6480;
}
[data-theme="light"]{
  --bg:#f4f6ff;--bg2:#eceffe;--bg3:#e4e8fc;
  --surface:#ffffff;--surface2:#f0f3ff;
  --border:#0000001a;--border2:#00000022;
  --text:#0d1033;--text2:#3d4875;--text3:#7c86b0;
  --blue:#3a63e8;--blue2:#2a52d4;--purple:#7c3af6;
  --cyan:#0ea5c9;--green:#059669;--orange:#d97706;--red:#dc2626;
  --grad:linear-gradient(135deg,#3a63e8,#7c3af6);
  --glow:0 0 40px #3a63e822;
  --nav-bg:rgba(244,246,255,.92);
  --chart-grid:#00000008;--chart-tick:#7c86b0;
}
[data-theme="ocean"]{
  --bg:#030d1a;--bg2:#061526;--bg3:#0a1e35;
  --surface:#0d2540;--surface2:#103050;
  --border:#ffffff12;--border2:#ffffff20;
  --text:#d4f0ff;--text2:#7ab8d4;--text3:#3a6a84;
  --blue:#00b4d8;--blue2:#0096b7;--purple:#5e60ce;
  --cyan:#00f5d4;--green:#06d6a0;--orange:#ffd166;--red:#ef476f;
  --grad:linear-gradient(135deg,#00b4d8,#06d6a0);
  --glow:0 0 40px #00b4d822;
  --nav-bg:rgba(3,13,26,.92);
  --chart-grid:#ffffff08;--chart-tick:#3a6a84;
}
[data-theme="forest"]{
  --bg:#060d08;--bg2:#0a140b;--bg3:#0f1d11;
  --surface:#142418;--surface2:#1a2e1e;
  --border:#ffffff12;--border2:#ffffff20;
  --text:#d8f4dc;--text2:#7fb88a;--text3:#3d6647;
  --blue:#52b788;--blue2:#3d9c6e;--purple:#9b5de5;
  --cyan:#2dc653;--green:#57cc99;--orange:#f4a261;--red:#e63946;
  --grad:linear-gradient(135deg,#52b788,#2dc653);
  --glow:0 0 40px #52b78822;
  --nav-bg:rgba(6,13,8,.92);
  --chart-grid:#ffffff08;--chart-tick:#3d6647;
}
[data-theme="sunset"]{
  --bg:#100609;--bg2:#180a0f;--bg3:#200e14;
  --surface:#2a1018;--surface2:#341520;
  --border:#ffffff12;--border2:#ffffff20;
  --text:#fff0f3;--text2:#d4819a;--text3:#8a4560;
  --blue:#ff6b9d;--blue2:#e5508a;--purple:#c77dff;
  --cyan:#ff9ef5;--green:#80ed99;--orange:#ffb347;--red:#ff4d6d;
  --grad:linear-gradient(135deg,#ff6b9d,#c77dff);
  --glow:0 0 40px #ff6b9d22;
  --nav-bg:rgba(16,6,9,.92);
  --chart-grid:#ffffff08;--chart-tick:#8a4560;
}

html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastSlide{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}

/* ──── NAV ──── */
nav{position:fixed;top:0;left:0;right:0;z-index:200;height:60px;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;background:var(--nav-bg);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);transition:background .3s}
.nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.25rem;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;cursor:pointer;display:flex;align-items:center;gap:.3rem}
.nav-links{display:flex;align-items:center;gap:1.25rem}
.nav-link{color:var(--text2);text-decoration:none;font-size:.875rem;font-weight:500;cursor:pointer;transition:color .2s;background:none;border:none;font-family:inherit}
.nav-link:hover,.nav-link.active{color:var(--text)}
.nav-divider{width:1px;height:20px;background:var(--border2)}
.nav-avatar{width:28px;height:28px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:#fff;flex-shrink:0}
.nav-btn{background:var(--grad);color:#fff;border:none;padding:.4rem 1rem;border-radius:8px;font-size:.8125rem;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .2s}
.nav-btn:hover{opacity:.85}
.nav-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2);padding:.4rem 1rem;border-radius:8px;font-size:.8125rem;font-weight:500;cursor:pointer;font-family:inherit;transition:all .2s}
.nav-settings{background:transparent;border:1px solid var(--border);color:var(--text3);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.nav-settings:hover{border-color:var(--blue);color:var(--blue);background:var(--surface)}
.nav-ghost:hover{border-color:var(--red);color:var(--red)}

/* ── THEME TOGGLE BUTTON ── */
.theme-btn{background:var(--surface);border:1px solid var(--border2);color:var(--text2);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;position:relative}
.theme-btn:hover{border-color:var(--blue);color:var(--blue)}
.theme-dropdown{position:absolute;top:42px;right:0;background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:.5rem;display:none;flex-direction:column;gap:.25rem;min-width:140px;box-shadow:0 8px 32px #00000040;z-index:999;animation:scaleIn .2s ease}
.theme-dropdown.open{display:flex}
.theme-option{display:flex;align-items:center;gap:.625rem;padding:.5rem .75rem;border-radius:8px;cursor:pointer;font-size:.8125rem;color:var(--text2);transition:all .15s;border:none;background:none;font-family:inherit;width:100%;text-align:left}
.theme-option:hover{background:var(--surface2);color:var(--text)}
.theme-option.active{background:var(--surface2);color:var(--blue)}
.theme-swatch{width:12px;height:12px;border-radius:50%;flex-shrink:0}

/* ──── PAGES ──── */
.page{display:none;min-height:100vh;animation:fadeIn .35s ease}
.page.active{display:block}

/* ──── AUTH ──── */
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;position:relative;overflow:hidden}
.auth-bg{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 80% 60% at 30% -10%,#4f7dff18,transparent 60%),radial-gradient(ellipse 60% 50% at 80% 90%,#8b5cf610,transparent 60%)}
.auth-grid{position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 60% 60% at 50% 50%,black 20%,transparent 100%)}
.auth-card{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:2.5rem 2rem;position:relative;z-index:1;animation:scaleIn .4s ease;box-shadow:0 40px 80px #00000060}
.auth-card::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,var(--blue),var(--purple),transparent)}
.auth-brand{display:block;text-align:center;font-family:'Syne',sans-serif;font-weight:800;font-size:1.25rem;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:1.5rem;cursor:pointer}
.auth-title{font-family:'Syne',sans-serif;font-size:1.625rem;font-weight:800;text-align:center;margin-bottom:.5rem}
.auth-sub{font-size:.875rem;color:var(--text2);text-align:center;margin-bottom:2rem;font-weight:300}
.form-field{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1.125rem}
.form-label{font-size:.8125rem;font-weight:600;color:var(--text2)}
.form-input{background:var(--bg);border:1px solid var(--border2);border-radius:10px;padding:.75rem 1rem;color:var(--text);font-family:inherit;font-size:.9375rem;outline:none;transition:border-color .2s,box-shadow .2s;width:100%}
.form-input::placeholder{color:var(--text3)}
.form-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px #4f7dff22}
.field-err{font-size:.75rem;color:var(--red);animation:fadeIn .2s}
.err-banner{background:#ef444415;border:1px solid #ef444440;border-radius:10px;padding:.75rem 1rem;font-size:.875rem;color:var(--red);text-align:center;margin-bottom:1rem}
.btn-primary{width:100%;background:var(--grad);color:#fff;border:none;padding:.875rem;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .2s,transform .2s;display:flex;align-items:center;justify-content:center;gap:.5rem;margin-top:.25rem}
.btn-primary:hover:not(:disabled){opacity:.88;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.auth-switch{text-align:center;font-size:.875rem;color:var(--text2);margin-top:1.5rem}
.auth-switch a{color:var(--blue);font-weight:600;cursor:pointer;text-decoration:none}
.auth-switch a:hover{text-decoration:underline}
.strength-wrap{display:flex;align-items:center;gap:.625rem;margin-top:.375rem}
.strength-bar{display:flex;gap:3px;flex:1}
.strength-seg{height:3px;flex:1;border-radius:100px;transition:background .3s;background:var(--surface2)}
.strength-label{font-size:.6875rem;font-weight:600;min-width:60px;text-align:right;transition:color .3s}

/* ── GOOGLE SIGN-IN BUTTON ── */
.auth-divider{display:flex;align-items:center;gap:.75rem;margin:1.25rem 0}
.auth-divider-line{flex:1;height:1px;background:var(--border2)}
.auth-divider-text{font-size:.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.btn-google{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:.75rem 1rem;color:var(--text);font-family:inherit;font-size:.9375rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.75rem;transition:all .2s;margin-bottom:.25rem}
.btn-google:hover{border-color:var(--blue);background:var(--surface);transform:translateY(-1px)}
.btn-google svg{width:18px;height:18px;flex-shrink:0}
.google-note{font-size:.72rem;color:var(--text3);text-align:center;margin-top:.5rem}

/* ──── DASHBOARD ──── */
.dash-page{max-width:1100px;margin:0 auto;padding:80px 2rem 4rem;animation:fadeIn .4s ease}
.dash-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem}
.dash-date{font-size:.8125rem;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.25rem}
.dash-greeting{font-family:'Syne',sans-serif;font-size:clamp(1.5rem,3vw,2rem);font-weight:800}
.grad-text{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.dash-right{display:flex;align-items:center;gap:1rem}
.btn-history{background:var(--surface);border:1px solid var(--border2);color:var(--text2);padding:.5rem 1.125rem;border-radius:10px;font-size:.875rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-history:hover{border-color:var(--blue);color:var(--text)}
.summary-row{display:grid;grid-template-columns:auto 1fr;gap:1.5rem;margin-bottom:2rem;align-items:start}
.calorie-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:1.75rem;display:flex;flex-direction:column;align-items:center;gap:1.25rem;min-width:220px;animation:fadeUp .4s ease}
.ring-wrap{position:relative;width:130px;height:130px}
.ring{width:100%;height:100%}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-cal{font-family:'Syne',sans-serif;font-size:1.75rem;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.ring-unit{font-size:.75rem;color:var(--text3);margin-top:.125rem}
.cal-info{width:100%;display:flex;flex-direction:column;gap:.5rem}
.cal-row{display:flex;justify-content:space-between;align-items:center}
.cal-lbl{font-size:.8125rem;color:var(--text2)}
.cal-val{font-size:.9375rem;font-weight:600}
.macro-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.nutr-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.25rem;transition:border-color .25s,transform .25s;animation:fadeUp .4s ease both}
.nutr-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.nutr-card.small{padding:.875rem 1rem}
.nutr-top{display:flex;align-items:center;gap:.5rem;margin-bottom:.625rem}
.nutr-icon{font-size:1rem}
.nutr-label{font-size:.6875rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3)}
.nutr-value{font-family:'Syne',sans-serif;font-size:1.75rem;font-weight:800;line-height:1;display:flex;align-items:baseline;gap:.25rem}
.nutr-card.small .nutr-value{font-size:1.25rem}
.nutr-unit{font-family:'DM Sans',sans-serif;font-size:.875rem;font-weight:400;color:var(--text3)}
.prog-wrap{margin-top:.75rem}
.prog-track{height:4px;background:var(--surface2);border-radius:100px;overflow:hidden;margin-bottom:.375rem}
.prog-fill{height:100%;border-radius:100px;transition:width 1s ease}
.prog-lbl{font-size:.6875rem;color:var(--text3)}
.section{margin-bottom:2rem}
.sec-title{font-family:'Syne',sans-serif;font-size:1.125rem;font-weight:700;margin-bottom:1rem}
.micro-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:.75rem}
.input-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:1.5rem;position:relative}
.input-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--grad);border-radius:20px 20px 0 0}
.meal-textarea{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:12px;padding:1rem;color:var(--text);font-family:inherit;font-size:.9375rem;resize:vertical;min-height:90px;outline:none;transition:border-color .2s,box-shadow .2s;margin-bottom:1rem}
.meal-textarea::placeholder{color:var(--text3)}
.meal-textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px #4f7dff22}
.meal-textarea:disabled{opacity:.6;cursor:not-allowed}
.chip-row{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.25rem}
.chip{background:var(--surface2);border:1px solid var(--border);border-radius:100px;padding:.25rem .875rem;font-size:.8125rem;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap}
.chip:hover{border-color:var(--blue);color:var(--blue)}
.input-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem}
.input-hint{font-size:.75rem;color:var(--text3)}
.analyze-btn{background:var(--grad);color:#fff;border:none;padding:.75rem 1.75rem;border-radius:10px;font-size:.9375rem;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .2s,transform .2s;display:flex;align-items:center;gap:.5rem;white-space:nowrap}
.analyze-btn:hover:not(:disabled){opacity:.88;transform:translateY(-1px)}
.analyze-btn:disabled{opacity:.55;cursor:not-allowed;transform:none}
.btn-spinner{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;animation:spin 1s linear infinite;flex-shrink:0}
.meal-list{display:flex;flex-direction:column;gap:.75rem}
.meal-item{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.125rem 1.25rem;display:flex;align-items:flex-start;gap:1rem;animation:slideIn .3s ease;transition:border-color .2s}
.meal-item:hover{border-color:var(--border2)}
.meal-left{flex:1;min-width:0}
.meal-text{font-size:.9375rem;font-weight:500;margin-bottom:.375rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meal-meta{display:flex;flex-wrap:wrap;align-items:center;gap:.375rem;font-size:.8125rem;color:var(--text2);margin-bottom:.5rem}
.meal-insight{font-size:.8125rem;color:var(--text2);background:linear-gradient(135deg,#10b98110,transparent);border:1px solid #10b98125;border-radius:8px;padding:.4rem .625rem;margin-bottom:.5rem}
.meal-foods{display:flex;flex-wrap:wrap;gap:.3rem}
.food-tag{background:var(--surface2);border:1px solid var(--border);border-radius:100px;padding:.15rem .5rem;font-size:.6875rem;color:var(--text3)}
.del-btn{background:transparent;border:1px solid transparent;color:var(--text3);width:28px;height:28px;border-radius:8px;cursor:pointer;font-size:1.125rem;line-height:1;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.del-btn:hover:not(:disabled){border-color:var(--red);color:var(--red);background:#ef444410}
.del-btn:disabled{opacity:.4}

/* ──── HISTORY ──── */
.hist-page{max-width:1100px;margin:0 auto;padding:80px 2rem 4rem;animation:fadeIn .4s ease}
.hist-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem}
.avg-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem}
.avg-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.25rem;animation:fadeUp .4s ease both}
.avg-label{font-size:.6875rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:.5rem}
.avg-value{font-family:'Syne',sans-serif;font-size:1.75rem;font-weight:800;line-height:1;display:flex;align-items:baseline;gap:.25rem}
.avg-unit{font-family:'DM Sans',sans-serif;font-size:.875rem;font-weight:400;color:var(--text3)}
.avg-sub{font-size:.75rem;color:var(--text3);margin-top:.375rem}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:1.75rem;margin-bottom:1.5rem}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:.75rem}
.chart-title{font-family:'Syne',sans-serif;font-size:1.0625rem;font-weight:700}
.tabs{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:3px;gap:2px}
.tab{background:transparent;border:none;color:var(--text2);padding:.375rem .875rem;border-radius:8px;font-size:.8125rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.tab.active{background:var(--surface2);color:var(--text)}
.chart-wrap{height:260px;position:relative}
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:1.75rem}
.table-head{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr 1fr;padding:.5rem .75rem;font-size:.6875rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);border-bottom:1px solid var(--border)}
.table-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr 1fr;padding:.875rem .75rem;font-size:.875rem;color:var(--text2);border-bottom:1px solid var(--border);align-items:center;transition:background .15s}
.table-row:hover{background:var(--surface2)}
.table-row:last-child{border-bottom:none}
.table-date{font-weight:500;color:var(--text)}
.badge-logged{background:#10b98115;border:1px solid #10b98130;color:var(--green);font-size:.6875rem;font-weight:600;padding:.2rem .6rem;border-radius:100px}
.badge-missed{background:var(--surface2);border:1px solid var(--border);color:var(--text3);font-size:.6875rem;font-weight:600;padding:.2rem .6rem;border-radius:100px}

async function analyzeWithAI(input){const apiKey=localStorage.getItem('na_apikey')||'';if(!apiKey||apiKey.length<20)return null;try{const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:700,system:'Return ONLY JSON: {calories,protein,carbs,fats,fiber,iron,calcium,vitaminC,vitaminB12,magnesium,potassium,detectedFoods:[{name,qty}],aiInsight}',messages:[{role:'user',content:'Analyze: '+input}]})});if(!resp.ok)return null;const data=await resp.json();const text=data.content?.[0]?.text||'';const parsed=JSON.parse(text.replace(/```json|```/g,'').trim());const{detectedFoods,aiInsight,...totals}=parsed;return{totals,found:detectedFoods||[],aiInsight:aiInsight||'',source:'ai'};}catch{return null;}}

async function handleGoogleSignIn(response) {
  try {
    // Decode the JWT credential from Google
    const parts = response.credential.split('.');
    const payload = JSON.parse(atob(parts[1]));
    const { name, email, sub: googleId, picture } = payload;

    // Try to login first, if fails register automatically
    try {
      const data = await api('POST', '/auth/login', {
        email,
        password: 'google_' + googleId // deterministic password for Google users
      });
      authToken = data.token;
      currentUser = data.user;
      localStorage.setItem('na_token', authToken);
      toast('Welcome back! 👋');
      App.showDash();
    } catch(e) {
      // User doesn't exist — auto register
      const data = await api('POST', '/auth/register', {
        name,
        email,
        password: 'google_' + googleId,
        googleId,
        picture
      });
      authToken = data.token;
      currentUser = data.user;
      localStorage.setItem('na_token', authToken);
      toast('Account created with Google! Welcome 🎉');
      App.showDash();
    }
  } catch(e) {
    toast('Google sign-in failed: ' + e.message, 'error');
  }
}

  async testAPIConnection(){
    const url=(document.getElementById('s-apiurl')?.value?.trim()||API_BASE).replace(/\/api$/,'');

    if(statusEl){statusEl.textContent='Testing...';statusEl.style.color='var(--text3)';}
    try{
      const res=await fetch(url+'/api/health',{signal:AbortSignal.timeout(5000)});
      const data=await res.json();
      if(statusEl){statusEl.textContent=data.db==='connected'?'✅ Connected! DB is online':'⚠️ Server OK but DB disconnected';statusEl.style.color=data.db==='connected'?'var(--green)':'var(--orange)';}
    }catch(e){if(statusEl){statusEl.textContent='❌ Cannot reach server';statusEl.style.color='var(--red)';}}
  },

  async saveSettings(){
    const apiUrl=document.getElementById('s-apiurl')?.value?.trim()||'';
    if(apiUrl){localStorage.setItem('na_api_base',apiUrl);}
    const apiKey=document.getElementById('s-apikey')?.value?.trim()||'';
    if(apiKey)localStorage.setItem('na_apikey',apiKey);else localStorage.removeItem('na_apikey');
    if(currentUser){
      const cal=parseInt(document.getElementById('g-cal')?.value)||2000;
      const pro=parseInt(document.getElementById('g-pro')?.value)||150;
      const carb=parseInt(document.getElementById('g-carb')?.value)||250;
      const fat=parseInt(document.getElementById('g-fat')?.value)||65;

      catch(e){toast('Failed to save goals: '+e.message,'error');return;}
    }
    this.closeSettings();

  _dashHTML(d,goals) {
    const calPct=Math.min(((d.totalCalories||0)/goals.calories)*100,100);
    const remaining=Math.max(goals.calories-(d.totalCalories||0),0);
    const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const now=new Date();
    const today=`${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
    const h=now.getHours();const tod=h<12?'morning':h<17?'afternoon':'evening';
    const r=314;const dash=r;const offset=r*(1-calPct/100);
    const macros=[
      {label:'Protein',value:d.totalProtein||0,unit:'g',color:'var(--blue)',icon:'💪',goal:goals.protein},
      {label:'Carbs',value:d.totalCarbs||0,unit:'g',color:'var(--purple)',icon:'🌾',goal:goals.carbs},
      {label:'Fats',value:d.totalFats||0,unit:'g',color:'var(--orange)',icon:'🥑',goal:goals.fats},
      {label:'Fiber',value:d.totalFiber||0,unit:'g',color:'var(--cyan)',icon:'🌿',goal:null},
    ];
    const micros=[
      {label:'Iron',value:d.micronutrients?.iron||0,unit:'mg',color:'var(--red)'},
      {label:'Calcium',value:d.micronutrients?.calcium||0,unit:'mg',color:'var(--cyan)'},
      {label:'Vitamin C',value:d.micronutrients?.vitaminC||0,unit:'mg',color:'var(--orange)'},
      {label:'B12',value:d.micronutrients?.vitaminB12||0,unit:'μg',color:'var(--purple)'},
      {label:'Magnesium',value:d.micronutrients?.magnesium||0,unit:'mg',color:'var(--green)'},
      {label:'Potassium',value:d.micronutrients?.potassium||0,unit:'mg',color:'var(--blue)'},
    ];
    const EXAMPLES=['2 rotis, dal, paneer curry','oats with milk, banana, coffee','3 idlis, sambar, coconut chutney','chicken curry, rice, salad','egg omelette, bread, orange juice','dal tadka, rice, curd, pickle'];
    return `<div class="dash-page">
      <div class="dash-header">
        <div><p class="dash-date">${today}</p><h1 class="dash-greeting">Good ${tod}, <span class="grad-text">${currentUser.name.split(' ')[0]}</span> 👋</h1></div>
        <div class="dash-right"><button class="btn-history" onclick="App.showHistory()">📈 History</button></div>
      </div>
      <div class="summary-row">
        <div class="calorie-card">
          <div class="ring-wrap">
            <svg class="ring" viewBox="0 0 120 120">
              <circle cx="60" cy="60" r="50" fill="none" stroke="var(--surface2)" stroke-width="10"/>
              <circle cx="60" cy="60" r="50" fill="none" stroke="url(#rg)" stroke-width="10" stroke-linecap="round" stroke-dasharray="${dash}" stroke-dashoffset="${offset}" transform="rotate(-90 60 60)" style="transition:stroke-dashoffset 1s ease"/>
              <defs><linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#4f7dff"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient></defs>
            </svg>
            <div class="ring-center"><span class="ring-cal">${d.totalCalories||0}</span><span class="ring-unit">kcal</span></div>
          </div>
          <div class="cal-info">
            <div class="cal-row"><span class="cal-lbl">Goal</span><span class="cal-val">${goals.calories} kcal</span></div>
            <div class="cal-row"><span class="cal-lbl">Remaining</span><span class="cal-val" style="color:${remaining<200?'var(--orange)':'var(--green)'}">${remaining} kcal</span></div>
            <div class="cal-row"><span class="cal-lbl">Meals today</span><span class="cal-val">${d.meals.length}</span></div>
          </div>
        </div>
        <div class="macro-grid">${macros.map(m=>this._nutrCard(m)).join('')}</div>
      </div>
      <div class="section"><h2 class="sec-title">Micronutrients</h2><div class="micro-grid">${micros.map(m=>this._nutrCard({...m,small:true})).join('')}</div></div>
      <div class="section"><h2 class="sec-title">Log a Meal</h2>
        <div class="input-card">
          <textarea id="meal-input" class="meal-textarea" placeholder="Describe what you ate... e.g. 2 rotis, dal, paneer curry, 1 glass of milk" rows="3"></textarea>
          <div class="chip-row">${EXAMPLES.map(e=>`<button class="chip" onclick="document.getElementById('meal-input').value='${e}'">${e}</button>`).join('')}</div>
          <div class="input-footer">
            <span class="input-hint">Ctrl+Enter to analyze</span>
            <button class="analyze-btn" id="analyze-btn" onclick="App.doAnalyze()">${(localStorage.getItem('na_apikey')||'').length>20?'🤖 AI Analyze &amp; Log':'⚡ Analyze &amp; Log Meal'}</button>
          </div>
        </div>
      </div>
      ${d.meals.length>0?`<div class="section"><h2 class="sec-title">Today's Meals (${d.meals.length})</h2><div class="meal-list" id="meal-list">${[...d.meals].reverse().map(m=>this._mealHTML(m)).join('')}</div></div>`:''}
    </div>`;
  },

  _nutrCard({label,value,unit,color,icon,goal,small}){
    const pct=goal?Math.min((value/goal)*100,100):null;
    return `<div class="nutr-card${small?' small':''}">
      <div class="nutr-top">${icon?`<span class="nutr-icon">${icon}</span>`:''}<span class="nutr-label">${label}</span></div>
      <div class="nutr-value" style="color:${color||'var(--text)'}">
        ${typeof value==='number'?Math.round(value*10)/10:value}<span class="nutr-unit">${unit}</span>
      </div>
      ${pct!==null?`<div class="prog-wrap"><div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${color||'var(--blue)'}"></div></div><span class="prog-lbl">${Math.round(pct)}% of goal</span></div>`:''}
    </div>`;
  },

  _mealHTML(m){
    return `<div class="meal-item" id="meal-${m._id}">
      <div class="meal-left">
        <div class="meal-text">${m.text}</div>
        <div class="meal-meta"><span style="color:var(--blue)">${m.calories} kcal</span>·<span>${m.protein}g protein</span>·<span>${m.carbs}g carbs</span>·<span>${m.fats}g fat</span></div>
        ${m.aiInsight?`<div class="meal-insight">💡 ${m.aiInsight}</div>`:''}
        ${m.detectedFoods?.length?`<div class="meal-foods">${m.detectedFoods.slice(0,6).map(f=>`<span class="food-tag">${f.qty>1?f.qty+'× ':''}${f.name}</span>`).join('')}</div>`:''}
      </div>
      <button class="del-btn" onclick="App.deleteMeal('${m._id}')" title="Remove">×</button>
    </div>`;
  },

  _attachDashEvents(){document.getElementById('meal-input')?.addEventListener('keydown',e=>{if(e.ctrlKey&&e.key==='Enter')App.doAnalyze();});},

  async doAnalyze() {
    if(this._analyzing)return;
    const input=document.getElementById('meal-input')?.value?.trim();
    if(!input)return;
    this._analyzing=true;
    const btn=document.getElementById('analyze-btn');
    const ta=document.getElementById('meal-input');
    if(btn){btn.disabled=true;btn.innerHTML='<div class="btn-spinner"></div> Analyzing...';}
    if(ta){ta.disabled=true;}
    const msgs=['🔍 Parsing meal...','🧠 Identifying foods...','📊 Calculating macros...','🔬 Analyzing nutrients...','✨ Saving to MongoDB...'];
    let mi=0;const intv=setInterval(()=>{mi=(mi+1)%msgs.length;if(btn&&btn.disabled)btn.innerHTML=`<div class="btn-spinner"></div> ${msgs[mi]}`;},400);
    try{
      const result=await analyzeMeal(input);
      clearInterval(intv);
      if(!result.found.length){toast('No foods recognized. Try: roti, dal, rice, chicken, apple...','error');return;}
      const meal={_id:'m_'+Date.now(),text:input,mealType:'snack',
        calories:Math.round(result.totals.calories||0),protein:Math.round((result.totals.protein||0)*10)/10,
        carbs:Math.round((result.totals.carbs||0)*10)/10,fats:Math.round((result.totals.fats||0)*10)/10,
        fiber:Math.round((result.totals.fiber||0)*10)/10,
        micronutrients:{iron:Math.round((result.totals.iron||0)*10)/10,calcium:Math.round(result.totals.calcium||0),vitaminC:Math.round(result.totals.vitaminC||0),vitaminB12:Math.round((result.totals.vitaminB12||0)*10)/10,magnesium:Math.round(result.totals.magnesium||0),potassium:Math.round(result.totals.potassium||0)},
        detectedFoods:result.found,aiInsight:result.aiInsight,source:result.source};
      const data=await api('POST','/records/meal',meal);
      this._todayRec=data.record;
      toast(`✓ Meal saved — ${meal.calories} kcal logged`);
      this.renderDash();
    }catch(e){clearInterval(intv);toast('Failed: '+e.message,'error');}
    finally{this._analyzing=false;if(btn){btn.disabled=false;btn.innerHTML='⚡ Analyze &amp; Log Meal';}if(ta){ta.disabled=false;ta.value='';}}
  },

  async deleteMeal(mealId) {
    const btn=document.querySelector(`#meal-${mealId} .del-btn`);
    if(btn)btn.disabled=true;
    try{const data=await api('DELETE','/records/meal/'+mealId);this._todayRec=data.record;toast('Meal removed');this.renderDash();}
    catch(e){toast('Failed: '+e.message,'error');if(btn)btn.disabled=false;}
  },

  // ── HISTORY ──────────────────────────────────────────
  _histChart:null, _histTab:'calories', _historyData:[],

  async renderHistory() {
    if(!currentUser){this.showLogin();return;}
    const p=document.getElementById('page-history');
    p.innerHTML=`<div class="loading-page"><div class="page-spinner"></div><p>Loading history...</p></div>`;
    try{const data=await api('GET','/records/history');this._historyData=data.history;}
    catch(e){p.innerHTML=`<div class="loading-page"><p style="color:var(--red)">Failed: ${e.message}</p></div>`;return;}
    const history=this._historyData;
    const tracked=history.filter(d=>d.totalCalories>0);
    const avg=key=>tracked.length?Math.round(tracked.reduce((s,d)=>s+(d[key]||0),0)/tracked.length):0;
    const avgCal=avg('totalCalories'),avgP=avg('totalProtein'),avgC=avg('totalCarbs'),avgF=avg('totalFats');
    const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const labels=history.map(d=>{const dt=new Date(d.date+'T00:00:00');return `${days[dt.getDay()]} ${months[dt.getMonth()]} ${dt.getDate()}`;}).reverse();
    p.innerHTML=`<div class="hist-page">
      <div class="hist-header">
        <div><p class="dash-date" style="margin-bottom:.3rem;font-size:.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:.1em">Last 7 Days</p><h1 class="dash-greeting">Nutrition <span class="grad-text">History</span></h1></div>
        <button class="btn-history" onclick="App.showDash()">← Dashboard</button>
      </div>
      <div class="avg-row">
        ${[['Avg. Calories',avgCal,'kcal','var(--blue)'],['Avg. Protein',avgP,'g','var(--blue)'],['Avg. Carbs',avgC,'g','var(--purple)'],['Avg. Fats',avgF,'g','var(--orange)']].map(([l,v,u,c])=>`<div class="avg-card"><div class="avg-label">${l}</div><div class="avg-value" style="color:${c}">${v}<span class="avg-unit">${u}</span></div><div class="avg-sub">${tracked.length} days tracked</div></div>`).join('')}
      </div>
      <div class="chart-card">
        <div class="chart-header"><span class="chart-title">Weekly Breakdown</span>
          <div class="tabs"><button class="tab active" id="tab-cal" onclick="App.switchTab('calories')">Calories</button><button class="tab" id="tab-mac" onclick="App.switchTab('macros')">Macros</button></div>
        </div>
        <div class="chart-wrap"><canvas id="hist-chart"></canvas></div>
      </div>
      <div class="table-card">
        <h2 class="chart-title" style="margin-bottom:1.25rem">Daily Records</h2>
        <div class="table-head"><span>Date</span><span>Calories</span><span>Protein</span><span>Carbs</span><span>Fats</span><span>Status</span></div>
        ${history.map(day=>{const dt=new Date(day.date+'T00:00:00');const lbl=`${days[dt.getDay()]}, ${months[dt.getMonth()]} ${dt.getDate()}`;const has=day.totalCalories>0;return `<div class="table-row"><span class="table-date">${lbl}</span><span style="color:var(--blue);font-weight:600">${has?day.totalCalories+' kcal':'—'}</span><span>${has?day.totalProtein+'g':'—'}</span><span>${has?day.totalCarbs+'g':'—'}</span><span>${has?day.totalFats+'g':'—'}</span><span>${has?'<span class="badge-logged">Logged</span>':'<span class="badge-missed">No data</span>'}</span></div>`;}).join('')}
      </div>
    </div>`;
    this._histTab='calories';this._drawChart(history,labels,'calories');
  },

  _drawChart(history,labels,type) {
    if(this._histChart){this._histChart.destroy();this._histChart=null;}
    const ctx=document.getElementById('hist-chart');if(!ctx)return;
    const rev=[...history].reverse();
    const currentTheme=document.documentElement.getAttribute('data-theme')||'dark';
    const gridColor=getComputedStyle(document.documentElement).getPropertyValue('--chart-grid').trim()||'#ffffff08';
    const tickColor=getComputedStyle(document.documentElement).getPropertyValue('--chart-tick').trim()||'#5c6480';
    const opts={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:type==='macros',labels:{color:tickColor,font:{size:11},boxWidth:12,padding:16}},tooltip:{backgroundColor:'var(--surface2)',titleColor:'var(--text)',bodyColor:'var(--text2)',borderColor:'var(--border2)',borderWidth:1,cornerRadius:8,padding:10}},scales:{x:{grid:{color:gridColor},ticks:{color:tickColor,font:{size:11}}},y:{grid:{color:gridColor},ticks:{color:tickColor,font:{size:11}},beginAtZero:true}}};
    if(type==='calories'){this._histChart=new Chart(ctx,{type:'bar',data:{labels,datasets:[{label:'Calories (kcal)',data:rev.map(d=>d.totalCalories||0),backgroundColor:'rgba(79,125,255,.25)',borderColor:'#4f7dff',borderWidth:2,borderRadius:6}]},options:opts});}
    else{this._histChart=new Chart(ctx,{type:'line',data:{labels,datasets:[{label:'Protein (g)',data:rev.map(d=>d.totalProtein||0),borderColor:'#4f7dff',backgroundColor:'rgba(79,125,255,.08)',borderWidth:2,fill:true,tension:.4,pointBackgroundColor:'#4f7dff',pointRadius:4},{label:'Carbs (g)',data:rev.map(d=>d.totalCarbs||0),borderColor:'#8b5cf6',backgroundColor:'rgba(139,92,246,.08)',borderWidth:2,fill:true,tension:.4,pointBackgroundColor:'#8b5cf6',pointRadius:4},{label:'Fats (g)',data:rev.map(d=>d.totalFats||0),borderColor:'#f59e0b',backgroundColor:'rgba(245,158,11,.08)',borderWidth:2,fill:true,tension:.4,pointBackgroundColor:'#f59e0b',pointRadius:4}]},options:opts});}
  },

  switchTab(type){
    this._histTab=type;
    document.getElementById('tab-cal')?.classList.toggle('active',type==='calories');
    document.getElementById('tab-mac')?.classList.toggle('active',type==='macros');
    const history=this._historyData;
    const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const labels=history.map(d=>{const dt=new Date(d.date+'T00:00:00');return `${days[dt.getDay()]} ${months[dt.getMonth()]} ${dt.getDate()}`;}).reverse();
    this._drawChart(history,labels,type);
  }
};

// ── INIT ──────────────────────────────────────────────
document.addEventListener('keydown',(e)=>{if(e.key==='Escape'){const m=document.getElementById('settings-modal');if(m&&m.style.display!=='none')App.closeSettings();}});

// Close theme dropdown on outside click
document.addEventListener('click',(e)=>{
  const dd=document.getElementById('theme-dropdown');
  const btn=document.getElementById('theme-toggle-btn');
  if(dd&&dd.classList.contains('open')&&!dd.contains(e.target)&&e.target!==btn){dd.classList.remove('open');}
});

window.addEventListener('load',async()=>{
  // Clear any stale API URL from localStorage
  const savedUrl = localStorage.getItem('na_api_base') || '';
  if (savedUrl && !savedUrl.includes('ec42')) { localStorage.removeItem('na_api_base'); }

  initTheme();
  if(authToken){
    try{const data=await api('GET','/auth/me');currentUser=data.user;App.showDash();}
    catch(e){authToken=null;localStorage.removeItem('na_token');App.showLanding();}
  }else{App.showLanding();}
});
</script>
<div id="settings-modal" style="display:none"></div>
</body>
</html>
